# FIXED CONFIG - PROPER MODEL TRAINING
# Fix the label relationship issue

# Data Configuration
data:
  sample_rate: 16000
  duration: 1.5
  audio_format: "wav"
  only_asvspoof: true
  
  # Use balanced dataset
  force_balance: true
  max_samples_per_class: 500
  
  paths:
    asvspoof: "data/LA"
    processed: "processed"
    
  # Data splits
  splits:
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1

# Audio Feature Pipeline
audio:
  mfcc_only: true
  n_mfcc: 13
  n_fft: 512
  hop_length: 256
  mel: false
  spectral: false
  cqt: null
  harmonic: null
  augmentation: null
  jitter_shimmer: false
  advanced_features: false

# Model Architecture
model:
  audio_branch:
    backbone: "simple_cnn"
    embedding_dim: 64
    pretrained: false
    
    transformer:
      n_heads: 1
      n_layers: 1
      d_model: 64
      dropout: 0.1
  
  emg_branch:
    backbone: "none"
    embedding_dim: 1
    transformer: null
  
  fusion: null
  
  contrastive:
    weight: 0.0

# Training Configuration - FIXED
training:
  epochs: 25
  batch_size: 32
  learning_rate: 0.001
  
  # No stages
  stages: null
  
  # Optimizer
  optimizer:
    type: "adam"
    lr: 0.001
    weight_decay: 1e-5
    betas: [0.9, 0.999]
    
  # Scheduler
  scheduler:
    type: "cosine"
    warmup_epochs: 1
    min_lr: 0.0001
    
  # Loss - CRITICAL FIX
  loss:
    classification: "BCEWithLogits"
    focal: false
    focal_alpha: 0.25
    focal_gamma: 2.0
    label_smoothing: 0.0
    
  # Regularization
  regularization:
    dropout: 0.1
    weight_decay: 1e-5
    gradient_clip: 1.0
    mixup: 0.0
    cutmix: 0.0
    
  mixed_precision: false
  
  # Checkpointing
  checkpoint:
    save_freq: 5
    save_best: true
    resume: null

# Evaluation
evaluation:
  metrics: ["accuracy"]
  batch_size: 32

# Logging
logging:
  level: "INFO"
  tensorboard: false
  wandb: false

# Hardware
device: "cpu"
compile: false

# Seeds
seed: 42
deterministic: true
